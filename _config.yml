# Site settings
title: Bibliotheca Hebraica Atlantica
email: judaicadh@gmail.com
description: >
  Bibliotheca Hebraica Atlantica

baseurl: /bibliothecahebraicaatlantica # the subpath of your site, e.g. /blog/
url: https://judaica.github.io # the base hostname & protocol for your site

# Google Analytics 4 Measurement ID (looks like G-XXXXXXXXXX).
# Get it from Google Analytics > Admin > Data Streams > your web stream.
# Leave blank to disable tracking. Only loads on the live (production) build.
google_analytics: G-B9ETXS6DG6


# theme options from https://bootswatch.com/
# comment out this to use default Bootstrap
bootwatch: Journal

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap


exclude:
  - Gemfile
  - Gemfile.lock
  - .idea/
  - .gitignore
  - README.md
timezone: Philadelphia
defaults:
- scope:
    path: _posts
    type: posts
  values:
    layout: post
    sectionid: blog

- scope:
    path: _docs
    type: docs
  values:
    layout: docs
    sectionid: docs
    seo:
      type: "WebPage"

collections:
  docs:
    permalink: /:collection/:path/
    output: true
  posts:
    permalink: /blog/:year/:month/:day/:title/
    output: true
