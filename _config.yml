# Site settings
title: Bibliotheca Hebraica Atlantica
email: judaicadh@gmail.com
author: Judaica Digital Humanities at the Penn Libraries
description: >
  A digital survey of Hebrew and Hebraic books in the libraries of the colonial
  Atlantic world — datasets documenting Christian and Jewish Hebraica that crossed
  the Atlantic to early America in the 17th and 18th centuries.

baseurl: "" # served at the domain root on Netlify (no subpath)
url: https://bibliotecahebraicaatlantica.judaicadhpenn.org # the base hostname & protocol for your site

# Google Analytics 4 Measurement ID (looks like G-XXXXXXXXXX).
# Get it from Google Analytics > Admin > Data Streams > your web stream.
# Leave blank to disable tracking. Only loads on the live (production) build.
google_analytics: G-B9ETXS6DG6


# theme options from https://bootswatch.com/
# comment out this to use default Bootstrap
bootwatch: Journal

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap


exclude:
  - Gemfile
  - Gemfile.lock
  - .idea/
  - .gitignore
  - README.md
  - netlify.toml
  - vendor/
timezone: Philadelphia
defaults:
# Default social-share image for every page (Open Graph / Twitter cards).
- scope:
    path: ""
  values:
    image: /img/bg.jpg

- scope:
    path: _posts
    type: posts
  values:
    layout: post
    sectionid: blog

- scope:
    path: _docs
    type: docs
  values:
    layout: docs
    sectionid: docs
    seo:
      type: "WebPage"

collections:
  docs:
    permalink: /:collection/:path/
    output: true
  posts:
    permalink: /blog/:year/:month/:day/:title/
    output: true
